hydra:
  searchpath:
    - pkg://multimeditron.config
    - pkg://verl.trainer.config

defaults:
  - verl_trainer
  - nsjail-python-exec-pool
  - model/llama-3.1-70b
  - _self_

data:
  max_prompt_length: 1024
  max_response_length: 2048
  train_batch_size: 256
  val_batch_size: 256
  return_raw_chat: true
  train_files:
    - /capstor/store/cscs/swissai/a127/meditron/multimediset/reasoning/math-shepherd.parquet
  val_files:
    - /capstor/store/cscs/swissai/a127/meditron/multimediset/reasoning/math-shepherd-val.parquet
  prompt_key: prompt
  reward_fn_key: data_source
  return_multi_modal_inputs: false

actor_rollout_ref:
  model:
    path: ${model.path}
    tokenizer_path: ${oc.select:model.tokenizer_path,null}
  rollout:
    n: 32
    log_prob_micro_batch_size_per_gpu: 8
    tensor_model_parallel_size: 4
    data_parallel_size: 1
    free_cache_engine: false

    multi_turn:
      enable: true
      max_tool_response_length: 2048
      max_assistant_turns: 3
      tokenization_sanity_check_mode: strict
      tool_config_path: /users/gboye/MultiMeditron/config/rl/grpo/tools.yaml
  actor:
    ppo_mini_batch_size: 32
    ppo_micro_batch_size_per_gpu: 4
    fsdp_config:
      param_offload: false
      optimizer_offload: false
