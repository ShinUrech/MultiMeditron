hydra:
  searchpath:
    - pkg://multimeditron.config
    - pkg://verl.trainer.config

defaults:
  - verl_trainer
  - nsjail-python-exec-pool
  - _self_

data:
  train_files:
    - /capstor/store/cscs/swissai/a127/meditron/multimediset/reasoning/math-shepherd.parquet
  val_files:
    - /capstor/store/cscs/swissai/a127/meditron/multimediset/reasoning/math-shepherd-val.parquet
  prompt_key: prompt
  reward_fn_key: data_source

actor_rollout_ref:
  rollout:
    multi_turn:
      enable: true
      max_tool_response_length: 2048
      tokenization_sanity_check_mode: strict
      tool_config_path: /users/gboye/MultiMeditron/config/rl/grpo/tools.yaml
