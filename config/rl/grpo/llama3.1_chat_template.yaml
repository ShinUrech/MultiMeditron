custom_chat_template: |
  {%- if not date_string is defined %}{%- set date_string = "01 Oct 2025" %}{%- endif %}{%- if not tools is defined %}{%- set tools = none %}{%- endif %}{%- if messages[0]['role'] == 'system' %}{%- set system_message = messages[0]['content'] | trim %}{%- set messages = messages[1:] %}{%- else %}{%- set system_message = "You are a helpful assistant." %}{%- endif %}{{- bos_token }}{{- "<|start_header_id|>system<|end_header_id|>" }}{{- "Cutting Knowledge Date: 01 Oct 2025\n" }}{{- "Today Date: " + date_string + "\n" }}{%- if tools is not none and tools|length > 0 %}{{- "You may call one or more functions to assist with the user query.\n" }}{{- "You are provided with function signatures within <tools><\/tools> XML tags:\n" }}{{- "<tools>\n" }}{%- for tool in tools %}{{- tool | tojson + "\n" }}{{- "\n\n" }}{%- endfor %}{{- "<\/tools>\n\n" }}{{- "For each function call, return a json object with function name and arguments within <tool_calls><\/tool_calls> XML tags:\n" }}{{- "<tool_calls>\n" }}{{- '{"name": <function-name>, "arguments": <args-json-object>}' }}{{- "<\/tool_calls>\n\n" }}{%- endif %}{{- system_message + "<|eot_id|>" }}{%- for message in messages %}{%- if (message['role'] == 'user') or (message['role'] == 'system' and not loop.first ) or (message['role'] == 'assistant' and not message.tool_calls) %}<|start_header_id|>{{ message['role'] }}<|end_header_id|>\n\n{%- if message['content'] %}{{ message['content'] | trim }}{% else %}{%- for content in message['content'] %}{%- if 'text' in content %}{{ content['text'] }}{%- endif %}{%- endfor %}{%- endif %}<|eot_id|>{%- elif message['role'] == 'assistant' %}{{- "<|start_header_id|>assistant<|end_header_id|>\n\n" }}{%- if message.content %}{{ message['content'] }}{%- endif %}{%- for tool_call in message.tool_calls %}{%- if tool_call.function is defined %}{%- set tool_call=tool_call.function %}{%- endif %}<tool_call>\n{"name": "{{ tool_call.name }}", "arguments": {{ tool_call.arguments | tojson }}} {{- n }}<\/tool_call>\n{%- endfor %}{%- endif %}{%- endfor %}{%- if add_generation_prompt %}{{- "<|start_header_id|>assistant<|end_header_id|>\n\n" }}{%- endif %}
actor_rollout_ref:
  model:
    custom_chat_template: ${custom_chat_template}

