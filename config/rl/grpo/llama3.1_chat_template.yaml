custom_chat_template: "{%- if not date_string is defined %}{%- set date_string = \"01 Oct 2025\" %}{%- endif %}{%- if not tools is defined %}{%- set tools = none %}{%- endif %}{%- if messages[0]['role'] == 'system' %}{%- set system_message = messages[0]['content'] | trim %}{%- set messages = messages[1:] %}{%- else %}{%- set system_message = \"You are a helpful assistant.\" %}{%- endif %}<|start_header_id|>system<|end_header_id|>\nCutting Knowledge Date: 01 Oct 2025\nToday Date: {{ date_string }}\n{{ \"\\n\" + system_message | trim + \"\\n\\n\" }}{%- if tools is not none and tools|length > 0 %}# Tools\nYou may call one or more functions to assist with the user query.\nYou are provided with function signatures within <tools><\/tools> XML tags:\n\n<tools>{{ \"\n[\n\" }}{%- for tool in tools %}{{ tool | tojson + \",\\n\" }}{%- endfor %}]\n<\/tools>\n\nFor each function call, return a json object with function name and arguments within <tool_calls><\/tool_calls> XML tags:\n<tool_calls>\n{\"name\": <function-name>, \"arguments\": <args-json-object>}\n<\/tool_calls><|eot_id|>\n{%- endif %}{%- for message in messages %}{%- if (message['role'] == 'user') or (message['role'] == 'system') or (message['role'] == 'assistant' and not message.tool_calls) %}<|start_header_id|>{{ message['role'] }}<|end_header_id|>{{ \"\\n\\n\" }}{%- if message['content'] %}{{ message['content'] | trim }}{%- else %}{%- for content in message['content'] %}{%- if 'text' in content %}{{ content['text'] + \"\\n\" }}{%- endif %}{%- endfor %}{%- endif %}<|eot_id|>{%- elif message['role'] == 'assistant' %}<|start_header_id|>assistant<|end_header_id|>{{ \"\\n\\n\" }}{%- if message.content and message.content | trim | length > 0 %}{{ message['content'] | trim + \"\\n\\n\" }}{%- endif %}{%- for tool_call in message.tool_calls %}{%- if tool_call.function is defined %}{%- set tool_call=tool_call.function %}{%- endif %}<tool_call>\n{\"name\": \"{{ tool_call.name }}\", \"arguments\": {{ tool_call.arguments | tojson }}} {{ \"\\n\" }}<\/tool_call>{{ \"\\n\" }}<|eot_id|>{%- endfor %}{%- elif message['role'] == 'tool' %}<|start_header_id|>ipython<|end_header_id|>{{ \"\\n\\n\" }}{%- if message.content is mapping or message.content is iterable %}{{ message['content'] | tojson }}{%- else %}{{ message['content'] | trim }}{%- endif %}<|eot_id|>{%- endif %}{%- endfor %}{%- if add_generation_prompt %}<|start_header_id|>assistant<|end_header_id|>{{ \"\\n\\n\" }}{%- endif %}"
actor_rollout_ref:
  model:
    custom_chat_template: ${custom_chat_template}

